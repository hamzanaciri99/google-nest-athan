# Add this automation to Home Assistant. Easiest path: Settings > Automations
# & Scenes > top-right menu > Edit in YAML, then paste the "automation:" block
# below (merge it into your existing automations.yaml, don't overwrite).
#
# Replace the two placeholders before saving:
#   entity_id: calendar.prayer_times          -> your actual Google Calendar entity
#   entity_id: media_player.living_room_speaker -> your actual Google Nest speaker entity
#
# Both entity IDs can be found under Settings > Devices & Services > Entities.

automation:
  - alias: "Play Athan on Prayer Time"
    description: >-
      Plays the Athan on the Google Nest speaker whenever a prayer-time
      event starts on the "Prayer Times" Google Calendar.
    trigger:
      - platform: calendar
        entity_id: calendar.prayer_times
        event: start
    condition:
      - condition: state
        entity_id: input_boolean.athan_enabled
        state: "on"
    action:
      - service: media_player.volume_set
        target:
          entity_id: media_player.living_room_speaker
        data:
          volume_level: 0.6
      - service: media_player.play_media
        target:
          entity_id: media_player.living_room_speaker
        data:
          media_content_id: "https://cdn.aladhan.com/audio/adhans/a9.mp3"
          media_content_type: music
    mode: single
